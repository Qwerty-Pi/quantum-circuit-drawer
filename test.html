<style>
:root {
    --text-color: #cccccc;
    --background-color: #151515;
    --selection-color: #f5c36060;
}

@media print {
    :root {
        --text-color: #151515;
        --background-color: #FFFFFF;
        --selection-color: var(--background-color);
    }
}

* :not(mjx-container *) {
    font-family: 'Cascadia Code';
    ::selection {
        color: var(--text-color);
        background-color: var(--selection-color);
    }
    color: var(--text-color);
}

body {
    font-size: 15px;
    background-color: var(--background-color);
}

.hljs {
    padding: 0 !important;
    background: var(--background-color) !important;
}
</style>

<!-- Include svg.js -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/svg.js/3.2.4/svg.min.js"></script>
<!-- Include the quantum-circuit-drawer library -->
<script src="dist/quantum-circuit-drawer.js"></script>

<div style="display: flex; flex-direction: column; text-align: center;">
  <div>Preparation of EPR Pair</div>
  <div id="circuit-epr-pair" class="circuit-container">
</div>

<div style="display: flex; flex-direction: column; text-align: center;">
  <div>Quantum Teleportation</div>
  <div id="circuit-quantum-teleport" class="circuit-container">
</div>

<script>
  const { Circuit, Renderer, MeasurementGate, HadamardGate, CNOTGate, CXGate, CZGate } = QuantumCircuitDrawer;

  const circuitStyle = {
    gateFill: "#cccccc",
    gateStroke: "#606060",
    lineColor: "#cccccc",
    fontColor: "#151515",
    backgroundColor: "#151515",
    fontSize: "20px",
    lineWidth: 2,
    gateStrokeWidth: 2,
    gateWidth: 45,
    gateHeight: 40
  };

  const drawCircuit = function(circuitName, circuit) {
    const renderer = new Renderer(circuit, `circuit-${circuitName}`, circuitStyle);
    renderer.draw();
  }

  {
    const circuit = new Circuit(2);
    circuit.addGate(new HadamardGate(0));
    circuit.addGate(new CNOTGate(0, 1));
    drawCircuit("epr-pair", circuit);
  }

  {
    const circuit = new Circuit(3);
    circuit.addGate(new CNOTGate(0, 1));
    circuit.addGate(new HadamardGate(0));
    circuit.addGate(new MeasurementGate([0, 1]));
    circuit.addGate(new CXGate(1, 2));
    circuit.addGate(new CZGate(0, 2));
    drawCircuit("quantum-teleport", circuit);
  }
</script>
